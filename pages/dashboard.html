<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="../styles/layout/sidebar.css">
    <link rel="stylesheet" href="../styles/base/normalize.css">
</head>
<body>
    <div class="dashboard">
        <aside class="sidebar">
            <div class="logo">
                <img src="../assets/images/logo.svg" alt="logo">
                <h1>NexusView</h1>
            </div>
            <ul class="links">
                <li class="active sidebar-link">
                    <a href="">
                        <img src="../assets/images/Dashboard-icon.svg" alt="dashboard-icon">
                        <span>Dashboard</span>
                    </a>
                </li>
                <li class="sidebar-link">
                    <a href="">
                        <img src="../assets/images/Users-icon.svg" alt="users-icon">
                        <span>Users</span>
                    </a>
                </li>
                <li class="sidebar-link">
                    <a href="">
                        <img src="../assets/images/Analytics-icon.svg" alt="analytics-icon">
                        <span>Analytics</span>
                    </a>
                </li>
                <li class="sidebar-link">
                    <a href="">
                        <img src="../assets/images/Orders-icon.svg" alt="orders-icon">
                        <span>Orders</span>
                    </a>
                </li>
                <li class="sidebar-link">
                    <a href="">
                        <img src="../assets/images/Messages-icon.svg" alt="messages-icon">
                        <span>Messages</span>
                    </a>
                </li>
                <li class="sidebar-link">
                    <a href="">
                        <img src="../assets/images/Settings-icon.svg" alt="settings-icon">
                        <span>Settings</span>
                    </a>
                </li>
                
            </ul>
            <div class="plan-type">
                <div class="plan-info">
                    <p class="plan-name">Current Plan</p>
                    <p class="plan-type-name">Startup Pro</p>
                    <div class="progress-bar">
                        <div class="progress"></div>
                    </div>
                    <p class="progress-text">75% of data usage used</p>
                </div>
            </div>
        </aside>
        <div class="main">
            <header class="navbar"></header>
            <main class="content"></main>
        </div>
    </div>
    <script src="../js/components/sidebar.js"></script>
</body>
</html>
